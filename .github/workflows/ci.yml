name: .NET Elevator Challenge CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup the precise .NET SDK version
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x" # Tailored to the .NET 10 LTS requirement

      # 3. Restore all project dependencies
      - name: Restore Dependencies
        run: dotnet restore

      # 4. Enforce .editorconfig rules via dotnet format
      - name: Verify Code Formatting & Naming Conventions
        run: dotnet format --verify-no-changes --verbosity normal

      # 5. Build the entire solution without restoring again
      - name: Build Solution
        run: dotnet build --configuration Release --no-restore

      # 6. Run all unit tests (xUnit/NUnit/MSTest)
      - name: Run Unit Tests
        run: dotnet test --configuration Release --no-build --verbosity normal
